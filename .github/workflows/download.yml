name: Download cloud.mail.ru

on:
  workflow_dispatch:
    inputs:
      share_url:
        description: 'cloud.mail.ru 分享链接'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve and download
        run: |
          set -ex
          python3 << 'PYEOF'
          import re, urllib.request, subprocess, os, sys

          share_url = os.environ.get("SHARE_URL")
          print(f"Share URL: {share_url}")

          share_path = share_url.split("/public/", 1)[1]
          print(f"Share path: {share_path}")

          req = urllib.request.Request(share_url, headers={"User-Agent": "Mozilla/5.0"})
          html = urllib.request.urlopen(req).read().decode("utf-8", errors="ignore")

          m = re.search(r'"weblink_get"\s*:\s*\{[^}]*"url"\s*:\s*"([^"]+)"', html)
          if not m:
              m = re.search(r'"weblink_get"\s*:\s*\[\s*\{[^}]*"url"\s*:\s*"([^"]+)"', html)
          if not m:
              print("ERROR: Could not find weblink_get URL")
              sys.exit(1)

          base_url = m.group(1)
          download_url = f"{base_url}/{share_path}"
          print(f"Download URL: {download_url}")

          result = subprocess.run([
              "curl", "-L", "-o", "/tmp/downloaded_file",
              "--retry", "5", "--retry-delay", "10", "--connect-timeout", "60",
              "-H", "User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)",
              download_url
          ])
          if result.returncode != 0:
              print(f"curl failed: {result.returncode}")
              sys.exit(1)

          size = os.path.getsize("/tmp/downloaded_file")
          print(f"Downloaded: {size} bytes ({size // 1024 // 1024} MB)")
          if size < 100_000_000:
              print("ERROR: File too small")
              sys.exit(1)
          print("✅ Download successful!")
          PYEOF
        env:
          SHARE_URL: ${{ github.event.inputs.share_url }}

      - name: Split into chunks
        run: |
          set -ex
          mkdir -p /tmp/parts
          split -b 450M -d -a 3 /tmp/downloaded_file /tmp/parts/file_part_
          echo "=== Parts ==="
          ls -lh /tmp/parts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloud-mail-ru-download
          path: /tmp/parts/file_part_*
          retention-days: 7
