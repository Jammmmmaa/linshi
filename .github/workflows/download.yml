name: Download Waves

on:
  workflow_dispatch:
    inputs:
      share_url:
        description: 'cloud.mail.ru 分享链接'
        required: true
        default: 'https://cloud.mail.ru/public/yoRE/xPMCpHAup'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve download URL via API
        id: resolve
        run: |
          set -ex
          SHARE_URL="${{ github.event.inputs.share_url }}"
          echo "Share URL: $SHARE_URL"

          # 提取 share ID (yoRE/xPMCpHAup)
          SHARE_ID=$(echo "$SHARE_URL" | grep -oP 'public/\K.*')
          echo "Share ID: $SHARE_ID"

          # 从页面 HTML 解析 weblink_get 基础 URL
          BASE_URL=$(curl -sL -A '' "$SHARE_URL" | grep -oP '"weblink_get":\[\{"count":1,"url":"\K[^"]+' || true)
          echo "Base URL from HTML: $BASE_URL"

          if [ -z "$BASE_URL" ]; then
            echo "HTML parse failed, trying API v2 dispatcher..."
            BASE_URL=$(curl -s "https://cloud.mail.ru/api/v2/dispatcher?api=2" \
              | grep -oP '"weblink_get":\[\{"count":"[^"]+","url":"\K[^"]+')
            echo "Base URL from dispatcher: $BASE_URL"
          fi

          if [ -z "$BASE_URL" ]; then
            echo "ERROR: Could not resolve base URL"
            exit 1
          fi

          # 获取 download token
          TOKEN=$(curl -s "https://cloud.mail.ru/api/v2/tokens/download" | grep -oP '"token":"\K[^"]+')
          echo "Token: $TOKEN"

          if [ -z "$TOKEN" ]; then
            echo "ERROR: Could not get download token"
            exit 1
          fi

          # 构建直链
          ENCODED_ID=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SHARE_ID'))")
          DOWNLOAD_URL="${BASE_URL}/${ENCODED_ID}?key=${TOKEN}"
          echo "Download URL: $DOWNLOAD_URL"

          # 写入 output
          echo "url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"

      - name: Download file
        run: |
          set -ex
          URL="${{ steps.resolve.outputs.url }}"
          echo "Downloading from: $URL"

          curl -L -o /tmp/waves.dmg \
            --retry 5 \
            --retry-delay 10 \
            --connect-timeout 30 \
            -H "User-Agent: Mozilla/5.0" \
            "$URL"

          ls -lh /tmp/waves.dmg

          FILESIZE=$(stat -c%s /tmp/waves.dmg)
          echo "Size: $FILESIZE bytes"

          if [ "$FILESIZE" -lt 100000000 ]; then
            echo "ERROR: File too small, download may have failed"
            head -c 500 /tmp/waves.dmg
            exit 1
          fi

          echo "Download successful!"

      - name: Split into chunks
        run: |
          set -ex
          # Split into 1.8GB chunks for GitHub Release (2GB limit)
          split -b 1800M -d -a 3 /tmp/waves.dmg "/tmp/waves_part_"
          echo "=== Parts ==="
          ls -lh /tmp/waves_part_*

      - name: Delete old release if exists
        continue-on-error: true
        run: |
          gh release delete waves-v17 --yes || true
          git tag -d waves-v17 2>/dev/null || true
          git push --delete origin waves-v17 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: waves-v17-download
          name: Waves Ultimate 17 macOS
          body: |
            从 cloud.mail.ru 下载后分片上传。

            合并方法：
            ```bash
            cat waves_part_* > waves.dmg
            hdiutil attach waves.dmg
            ```
          files: /tmp/waves_part_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
