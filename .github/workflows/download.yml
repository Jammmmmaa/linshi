name: Download to GitHub

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '下载链接'
        required: true
      filename:
        description: '文件名'
        required: false
        default: 'Waves Ultimate 17 v26.06.23 U2B macOS.dmg'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download file
        run: |
          FILENAME="${{ github.event.inputs.filename }}"
          echo "Downloading: $FILENAME"
          curl -L -o "$FILENAME" "${{ github.event.inputs.download_url }}" --retry 3 --retry-delay 5
          ls -lh "$FILENAME"

      - name: Split into 1.8GB parts
        run: |
          FILENAME="${{ github.event.inputs.filename }}"
          # Split into 1.8GB chunks (under GitHub 2GB limit)
          split -b 1800M -d -a 3 "$FILENAME" "part_"
          echo "Parts created:"
          ls -lh part_*

      - name: Create Release and Upload Parts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: waves-v17-download
          name: Waves Ultimate 17 macOS
          body: |
            9.41GB，分片下载后合并：
            ```
            cat part_* > Waves_Ultimate_17_v26.06.23_U2B_macOS.dmg
            ```
          files: part_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
